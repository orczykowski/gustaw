<div class="calculator">
  <div class="calc-hero">
    <div class="calc-hero-icon">🐱</div>
    <h1>Kalkulator wieku kota</h1>
    <p class="calc-hero-sub">Ile lat miałby twój kot, gdyby był człowiekiem?</p>
  </div>

  <div class="age-content">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="age-form">
      <div class="age-input-row">
        <div class="form-field">
          <label for="birthDate">Data urodzin kota</label>
          <input
            id="birthDate"
            formControlName="birthDate"
            type="date"
            [attr.max]="todayStr"
            autocomplete="off">
          <span class="field-error" *ngIf="form.get('birthDate')?.touched && form.get('birthDate')?.errors?.['required']">
            Podaj datę urodzin
          </span>
          <span class="field-error" *ngIf="form.get('birthDate')?.touched && form.get('birthDate')?.errors?.['future']">
            Data urodzin nie może być w przyszłości
          </span>
        </div>
        <button type="submit" class="btn-primary" [disabled]="form.invalid">Oblicz</button>
      </div>
    </form>

    <div *ngIf="catAgeResult !== null" class="age-result">
      <div class="result-cards">
        <div class="age-result-card">
          <span class="age-result-label">Wiek kota</span>
          <span class="age-result-value age-result-value--text">{{ catAgeResult.label }}</span>
        </div>
        <div class="age-result-card age-result-card--human">
          <span class="age-result-label">W ludzkich latach</span>
          <div class="age-result-number-row">
            <span class="age-result-value">{{ humanAge }}</span>
            <span class="age-result-unit">lat</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
