<div class="article-wrapper">
  <div class="blog-hero">
    <div class="blog-hero-icon">🐾</div>
    <h1>Artykuły</h1>
    <p class="blog-hero-sub">Przydatna wiedza o kocim świecie</p>
    <div class="search-wrapper">
      <input
        type="text"
        class="search-input"
        placeholder="Szukaj artykułów..."
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearch()"
      />
    </div>
  </div>
  @for (link of filteredLinks; track link) {
    <app-article-link
      [data]="link">
    </app-article-link>
  }
  @if (filteredLinks.length === 0) {
    <p class="no-results">Nie znaleziono artykułów pasujących do "{{ searchQuery }}"</p>
  }
</div>
