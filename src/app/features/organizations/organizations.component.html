<div class="org-hero">
  <div class="org-hero-bg">
    <img src="assets/support_banner.webp" alt="" aria-hidden="true">
    <div class="org-hero-overlay"></div>
  </div>
  <div class="org-hero-content">
    <span class="org-hero-badge">Wsparcie</span>
    <h1>Organizacje i miejsca, które warto wspierać</h1>
    <p class="org-hero-sub">Razem możemy więcej — wspieraj tych, którzy pomagają zwierzętom.</p>
  </div>
</div>
<div class="organizations-container">
  @for (organization of this.organizations; track organization) {
    <app-organization-info
      [organization]="organization">
    </app-organization-info>
  }
</div>
