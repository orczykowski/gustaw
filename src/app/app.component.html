<header>
  <div class="header-container">
    <a routerLink="/" id="logo">
      <img src="assets/logo.png" alt="logo">
      <div class="logo-text">
        <h1>Gustaw</h1>
        <h2>kocie rzeczy</h2>
      </div>
    </a>
    <nav>
      <div class="nav-dropdown"
           (mouseenter)="openCalcMenu()"
           (mouseleave)="closeCalcMenu()">
        <button class="nav-link nav-dropdown-trigger"
                [class.active]="isCalcActive()"
                (click)="calcMenuOpen=!calcMenuOpen">
          <span class="nav-text">Kalkulator</span>
          <span class="dropdown-caret" [class.open]="calcMenuOpen">▾</span>
        </button>
        <div class="nav-dropdown-menu" [class.visible]="calcMenuOpen"
             (mouseenter)="openCalcMenu()"
             (mouseleave)="closeCalcMenu()">
          <a routerLink="/kalkulator" [routerLinkActiveOptions]="{exact:true}"
             routerLinkActive="active" class="nav-dropdown-item"
             (click)="calcMenuOpen=false">Zapotrzebowanie na karmę</a>
          <a routerLink="/kalkulator/wiek" routerLinkActive="active"
             class="nav-dropdown-item" (click)="calcMenuOpen=false">Wiek</a>
        </div>
      </div>
      <a routerLink="/blog" routerLinkActive="active" class="nav-link">
        <span class="nav-text">Do poczytania</span>
      </a>
      <a routerLink="/warto-wspierac" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">❤️</span>
        <span class="nav-text">Warto wspierać</span>
      </a>
    </nav>
  </div>
</header>
<div id="main-content-container">
  <router-outlet></router-outlet>
</div>
<footer>
  <div class="footer-links">
    <a routerLink="/kalkulator" class="footer-link">Kalkulator kalorii</a>
    <span class="footer-dot"></span>
    <a routerLink="/kalkulator/wiek" class="footer-link">Kalkulator wieku</a>
    <span class="footer-dot"></span>
    <a routerLink="/blog" class="footer-link">{{ articleCount }} artykułów</a>
    <span class="footer-dot"></span>
    <a routerLink="/warto-wspierac" class="footer-link">Warto wspierać</a>
  </div>
  <span class="copyright">© Gustaw · kocie rzeczy</span>
</footer>
