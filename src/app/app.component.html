<header>
  <div class="header-container">
    <a routerLink="/" id="logo">
      <img src="assets/logo.png" alt="Gustaw – portal o kotach" fetchpriority="high" loading="eager">
      <div class="logo-text">
        <span class="logo-name">Gustaw</span>
        <span class="logo-tagline">kocie rzeczy</span>
      </div>
    </a>
    <nav>
      <div class="nav-dropdown">
        <a routerLink="/kalkulatory" routerLinkActive="active"
           class="nav-link nav-dropdown-label" [class.active]="isCalcActive()">Kalkulatory</a>
        <div class="nav-dropdown-menu">
          <a routerLink="/kalkulator/karma" routerLinkActive="active" class="nav-dropdown-item">Zapotrzebowanie na karmę</a>
          <a routerLink="/kalkulator/woda" routerLinkActive="active" class="nav-dropdown-item">Zapotrzebowanie na wodę</a>
          <a routerLink="/kalkulator/bmi" routerLinkActive="active" class="nav-dropdown-item">BMI</a>
          <a routerLink="/kalkulator/kondycja" routerLinkActive="active" class="nav-dropdown-item">Kondycja BCS</a>
          <a routerLink="/kalkulator/wiek" routerLinkActive="active" class="nav-dropdown-item">Wiek</a>
        </div>
      </div>
      <a routerLink="/blog" routerLinkActive="active" class="nav-link">Do poczytania</a>
      <a routerLink="/warto-wspierac" routerLinkActive="active" class="nav-link">Warto wspierać</a>
    </nav>
  </div>
</header>
<div id="main-content-container">
  <router-outlet></router-outlet>
</div>
<footer>
  <div class="footer-links">
    <a routerLink="/kalkulator/karma" class="footer-link">Kalkulator kalorii</a>
    <span class="footer-dot"></span>
    <a routerLink="/kalkulator/wiek" class="footer-link">Kalkulator wieku</a>
    <span class="footer-dot"></span>
    <a routerLink="/kalkulator/kondycja" class="footer-link">Kondycja BCS</a>
    <span class="footer-dot"></span>
    <a routerLink="/kalkulator/woda" class="footer-link">Nawodnienie</a>
    <span class="footer-dot"></span>
    <a routerLink="/kalkulator/bmi" class="footer-link">BMI kota</a>
    <span class="footer-dot"></span>
    <a routerLink="/blog" class="footer-link">{{ articleCount }} artykułów</a>
    <span class="footer-dot"></span>
    <a routerLink="/warto-wspierac" class="footer-link">Warto wspierać</a>
  </div>
  <span class="copyright">© 2021–2026 Gustaw · kocie rzeczy</span>
</footer>
